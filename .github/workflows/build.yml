name: Build Zord Client
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install PyInstaller
      run: |
        pip install pyinstaller mclib minecraft-launcher-lib
    - name: Create EXE
      run: |
        pyinstaller --onefile --noconsole launcher.py
    - name: Upload Launcher Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zord-Client-EXE
        path: dist/launcher.exe
